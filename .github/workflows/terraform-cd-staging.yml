name: Terraform Deployment for yape-mlstacks-2 Staging
'on':
  push:
    branches:
    - main
    paths:
    - yape-mlstacks-2/terraform/**
  workflow_dispatch: null
defaults:
  run:
    working-directory: ./yape-mlstacks-2/terraform
jobs:
  staging:
    concurrency: yape-mlstacks-2-staging-terraform-job
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: https://adb-6832525285606128.8.azuredatabricks.net
    steps:
    - uses: actions/checkout@v3
    - name: Generate AAD Token
      run: ../../.github/workflows/scripts/generate-aad-token.sh ${{ secrets.stagingAzureSpTenantId
        }} ${{ secrets.stagingAzureSpApplicationId }} ${{ secrets.stagingAzureSpClientSecret
        }}
    - uses: hashicorp/setup-terraform@v1
    - name: Terraform fmt
      id: fmt
      run: terraform -chdir=staging fmt -check
      continue-on-error: true
    - name: Configure Terraform state backend authentication
      run: '# Below we assume you''ve run the setup scripts under the cicd-setup-scripts
        directory

        # to create an Azure storage container and store its associated Azure ARM
        key as a Github Actions secret with

        # name ARM_ACCESS_KEY. We set the ARM_ACCESS_KEY environment variable to authenticate
        to the azurerm

        # backend as described in https://www.terraform.io/language/settings/backends/azurerm

        echo "ARM_ACCESS_KEY=${{secrets.ARM_ACCESS_KEY}}" >> "$GITHUB_ENV"

        '
    - name: Terraform Init
      id: init
      run: terraform -chdir=staging init
    - name: Terraform Validate
      id: validate
      run: terraform -chdir=staging validate
    - name: Terraform Plan
      id: plan
      run: 'terraform -chdir=staging plan -no-color \

        -var="git_repo_url=${{ github.server_url }}/${{ github.repository }}"

        '
    - name: Terraform Apply
      id: apply
      run: 'terraform -chdir=staging apply -auto-approve \

        -var="git_repo_url=${{ github.server_url }}/${{ github.repository }}"

        '
    - name: Terraform Output
      id: output
      run: terraform -chdir=staging output -json
    - name: Commit Terraform Output to File
      id: commit
      run: "mkdir -p output\necho '${{ steps.output.outputs.stdout }}' | jq '.' >\
        \ output/staging.json\ngit config --global user.name 'Terraform Output Github\
        \ Workflow'\ngit config --global user.email '<>'\noutput=$(git status --porcelain)\n\
        if [ -n \"$output\" ]\nthen\n  git add -A\n  git commit -m \"Commit staging\
        \ output\"\n  git push\n  git fetch origin release\n  git checkout release\n\
        \  git cherry-pick main\n  git push\nfi\n"
